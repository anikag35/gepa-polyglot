syntax = "proto3";
package gepa_rpc;
service GEPAService {
  rpc RunOptimization(stream ClientMessage) returns (stream ServerMessage);
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}
message ClientMessage {
  oneof payload {
    StartRequest start_request = 1;
    EvaluateBatchResponse evaluate_batch_response = 2;
    ReflectiveDatasetResponse reflective_dataset_response = 3;
  }
}
message ServerMessage {
  oneof payload {
    EvaluateBatchRequest evaluate_batch_request = 1;
    ReflectiveDatasetRequest reflective_dataset_request = 2;
    ProgressUpdate progress_update = 3;
    OptimizationComplete optimization_complete = 4;
    OptimizationError optimization_error = 5;
  }
}
message StartRequest {
  string run_id = 1;
  map<string, string> seed_candidate = 2;
  repeated Example trainset = 3;
  repeated Example valset = 4;
  string reflection_lm = 5;
  int32 max_metric_calls = 6;
}
message EvaluateBatchRequest {
  string request_id = 1;
  map<string, string> candidate = 2;
  repeated Example batch = 3;
  bool capture_traces = 4;
}
message EvaluateBatchResponse {
  string request_id = 1;
  repeated string outputs = 2;
  repeated float scores = 3;
  repeated Trajectory trajectories = 4;
}
message ReflectiveDatasetRequest {
  string request_id = 1;
  map<string, string> candidate = 2;
  repeated string components_to_update = 3;
  repeated Trajectory trajectories = 4;
}
message ReflectiveDatasetResponse {
  string request_id = 1;
  map<string, ReflectiveComponentData> reflective_data = 2;
}
message ProgressUpdate {
  int32 metric_calls_used = 1;
  int32 max_metric_calls = 2;
  float best_score = 3;
  map<string, string> best_candidate = 4;
}
message OptimizationComplete {
  string run_id = 1;
  map<string, string> best_candidate = 2;
  float best_score = 3;
}
message OptimizationError {
  string run_id = 1;
  string message = 2;
}
message StatusRequest {
  string run_id = 1;
}
message StatusResponse {
  enum Status {
    UNKNOWN = 0;
    RUNNING = 1;
    COMPLETE = 2;
    FAILED = 3;
  }
  string run_id = 1;
  Status status = 2;
  string message = 3;
  int32 metric_calls_used = 4;
}
message Example {
  string id = 1;
  map<string, string> fields = 2;
}
message Trajectory {
  map<string, string> input_fields = 1;
  string output = 2;
  string feedback = 3;
}
message ReflectiveComponentData {
  repeated ReflectiveEntry entries = 1;
}
message ReflectiveEntry {
  map<string, string> inputs = 1;
  string generated_output = 2;
  string feedback = 3;
}
